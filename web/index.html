<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channel4 — AI Shopping Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Channel<strong>4</strong></span>
      </div>
      <div class="header-actions">
        <div class="depth-picker">
          <label>Depth</label>
          <select id="depthSelect">
            <option value="quick">Quick</option>
            <option value="standard" selected>Standard</option>
            <option value="full">Full</option>
          </select>
        </div>
        <button class="header-btn" id="basketToggle" title="Basket Optimizer">🛒 Basket</button>
        <button class="header-btn" id="compareToggle" title="Compare Products">⚖️ Compare</button>
        <button class="header-btn" id="profileToggle" title="Shopping Profile">👤 Profile</button>
        <button class="header-btn new-chat-btn" id="newChatBtn">+ New chat</button>
      </div>
    </div>
  </header>

  <!-- Side panel overlay -->
  <div class="side-overlay hidden" id="sideOverlay"></div>

  <!-- Side panel -->
  <div class="side-panel hidden" id="sidePanel">
    <div class="side-panel-header">
      <span id="sidePanelTitle">Panel</span>
      <button class="side-close" id="sideClose">✕</button>
    </div>
    <div class="side-panel-body" id="sidePanelBody"></div>
  </div>

  <!-- Chat -->
  <main class="chat-main">
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state" id="emptyState">
        <div class="empty-logo">◈</div>
        <h1>What are you shopping for?</h1>
        <p>Describe what you need — I'll find, rank, and analyse the best options for you.</p>
        <div class="example-chips">
          <button class="chip" data-query="wireless headphones for the gym under $150">wireless headphones for the gym under $150</button>
          <button class="chip" data-query="best bluetooth speaker under $100">best bluetooth speaker under $100</button>
          <button class="chip" data-query="noise cancelling headphones for travel">noise-cancelling headphones for travel</button>
          <button class="chip" data-query="electric standing desk">electric standing desk</button>
          <button class="chip" data-query="yoga mat for beginners">yoga mat for beginners</button>
        </div>
      </div>
    </div>

    <!-- Input bar -->
    <div class="chat-input-wrap">
      <div class="chat-input-inner">
        <textarea id="chatInput" placeholder="Ask me anything — e.g. best running shoes under $120..." rows="1" autocomplete="off"></textarea>
        <button id="sendBtn" class="send-btn" aria-label="Send">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
